<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrimeTime Distributors</title>
  
  <!-- iMessage / Social Media Link Preview Meta Tags -->
  <meta property="og:title" content="PrimeTime Distributors">
  <meta property="og:description" content="Wholesale Vapes, Kratom, Hydroxy & Pre-Rolls. Browse the live catalog and place order requests instantly.">
  <meta property="og:image" content="https://primetimedist.com/logo.jpg">
  <meta property="og:url" content="https://primetimedist.com/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/logo.jpg" type="image/jpeg">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- EmailJS for Notifications -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-gray-50 antialiased text-gray-900">
  <div id="root"></div>

  <!-- 1. Import Firebase and make it available to our React code -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Store dependencies globally so Babel/React can access them without crashing
    window.firebaseDeps = {
        initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, 
        getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc
    };
    // Tell React that Firebase is ready
    window.dispatchEvent(new Event('firebase-loaded'));
  </script>

  <!-- 2. Main React Application -->
  <script type="text/babel">
    const startApp = () => {
      const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc } = window.firebaseDeps;
      const { useState, useEffect, useMemo } = React;

      // ==========================================
      // CONFIGURATION
      // ==========================================
      const YOUR_FIREBASE_CONFIG = {
        apiKey: "AIzaSyDKWtphOu3l3zS9T6JLelMFsPAO37d-qW4", 
        authDomain: "primetime-distributors.firebaseapp.com",
        projectId: "primetime-distributors",
        storageBucket: "primetime-distributors.firebasestorage.app",
        messagingSenderId: "368690208294",
        appId: "1:368690208294:web:5d0d0d89a8392594fb50e7",
        measurementId: "G-JWVFDD9Q7Q"
      };

      const EMAILJS_CONFIG = {
        serviceID: "YOUR_EMAILJS_SERVICE_ID",
        templateID: "YOUR_EMAILJS_TEMPLATE_ID",
        publicKey: "YOUR_EMAILJS_PUBLIC_KEY"
      };

      const ADMIN_ACCOUNTS = {
        'roudi': 'admin123',
        'affaan': 'admin123'
      };

      const firebaseConfig = typeof window.__firebase_config !== 'undefined' 
        ? JSON.parse(window.__firebase_config) 
        : YOUR_FIREBASE_CONFIG;

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'primetime-distributors';

      // ==========================================
      // ICONS
      // ==========================================
      const ShoppingCart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
      const Plus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
      const Trash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
      const Camera = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
      const LogInIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>;
      const Search = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
      const EditIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
      const Star = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={filled ? "text-yellow-400" : "text-gray-400"}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
      const ChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
      const Users = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
      const Package = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
      const HomeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

      // ==========================================
      // MAIN APP
      // ==========================================
      function App() {
        // Background Auth
        const [fbUser, setFbUser] = useState(null);
        const [authError, setAuthError] = useState(null);
        const [loadingAuth, setLoadingAuth] = useState(true); 
        
        // Custom Auth & State via Cookies (Instantly resolves on reload)
        const [activeUser, setActiveUser] = useState(() => {
          const match = document.cookie.match(new RegExp('(^| )pt_session=([^;]+)'));
          if (match) {
            try { return JSON.parse(decodeURIComponent(match[2])); } catch(e) {}
          }
          return null;
        }); 
        
        // View and Category Persistence Using Local Storage
        const [view, setView] = useState(() => {
          return localStorage.getItem('pt_view') || 'landing';
        });

        const [currentCategory, setCurrentCategory] = useState(() => {
          return localStorage.getItem('pt_category') || null;
        });

        // Automatically sync view & category changes to LocalStorage
        useEffect(() => { localStorage.setItem('pt_view', view); }, [view]);
        useEffect(() => {
          if (currentCategory) localStorage.setItem('pt_category', currentCategory);
          else localStorage.removeItem('pt_category');
        }, [currentCategory]);
        
        // Data
        const [products, setProducts] = useState([]);
        const [orders, setOrders] = useState([]);
        const [customers, setCustomers] = useState([]);
        const [cart, setCart] = useState([]);
        
        // UI
        const [toast, setToast] = useState(null);

        const showToast = (message, isError = false) => {
          setToast({ message, isError });
          setTimeout(() => setToast(null), 3500);
        };

        // Utility: Save Session to Cookie
        const setSessionCookie = (payload) => {
          document.cookie = `pt_session=${encodeURIComponent(JSON.stringify(payload))}; path=/; max-age=2592000; SameSite=Lax`;
        };

        // Utility: Clear Session
        const clearSessionCookie = () => {
          document.cookie = `pt_session=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
        };

        // 1. Initialize Under-the-hood Firebase Auth
        useEffect(() => {
          const initAuth = async () => {
            try {
              if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                await signInWithCustomToken(auth, window.__initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (err) {
              console.error("Auth failed:", err);
              setAuthError(err.message);
            }
          };
          initAuth();
          const unsubscribe = onAuthStateChanged(auth, (user) => {
            setFbUser(user);
            if (!user) {
              setLoadingAuth(false);
            }
          });
          return () => unsubscribe();
        }, []);

        // 2. Fetch Data & Restore Persistent Session
        useEffect(() => {
          if (!fbUser) return;
          
          // Fetch Public Data
          const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
          const unsubProds = onSnapshot(productsRef, (snap) => setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

          const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
          const unsubOrders = onSnapshot(ordersRef, (snap) => setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.timestamp - a.timestamp)));

          const customersRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
          const unsubCustomers = onSnapshot(customersRef, (snap) => setCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

          // Restore Persistent Login Session
          const sessionRef = doc(db, 'artifacts', appId, 'users', fbUser.uid, 'session', 'current');
          const unsubSession = onSnapshot(sessionRef, (snap) => {
            if (snap.exists()) {
              setActiveUser(snap.data());
            }
            setLoadingAuth(false);
          }, (err) => {
            console.error("Session restore ignored:", err);
            setLoadingAuth(false); 
          });

          return () => { unsubProds(); unsubOrders(); unsubCustomers(); unsubSession(); };
        }, [fbUser]);

        // Extract Categories
        const categories = useMemo(() => {
          const cats = products.map(p => p.category).filter(Boolean);
          return [...new Set(cats)];
        }, [products]);

        // Cart Logic
        const addToCart = (product, selectedOption = '', qtyToAdd = 1, priceOverride = null) => {
          if (!activeUser) {
              setView('login');
              return showToast("Please login to order", true);
          }
          
          const targetStock = product.hasVariants 
            ? product.variants?.find(v => v.name === selectedOption)?.stock 
            : product.stock;

          if (targetStock !== undefined && targetStock <= 0) return showToast("Item is out of stock!", true);
          
          // Verify we aren't exceeding stock across all matching variants in cart
          const totalInCart = cart.filter(item => item.id === product.id && item.selectedOption === selectedOption).reduce((sum, item) => sum + item.qty, 0);
          if (targetStock !== undefined && (totalInCart + qtyToAdd) > targetStock) {
              return showToast(`Only ${targetStock} available!`, true);
          }

          const itemPrice = priceOverride !== null ? priceOverride : product.price;

          setCart(prev => {
            const existingItem = prev.find(item => item.id === product.id && item.selectedOption === selectedOption);
            if (existingItem) return prev.map(item => (item.id === product.id && item.selectedOption === selectedOption) ? { ...item, qty: item.qty + qtyToAdd } : item);
            return [...prev, { ...product, qty: qtyToAdd, selectedOption, price: itemPrice }];
          });
        };

        const handleCheckout = async (formData) => {
          if (authError) return showToast("API Key Error: Check Firebase keys.", true);
          if (!fbUser) return showToast("Connecting... please wait.", true);
          
          try {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            
            // Save to Database
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
              customer: formData,
              items: cart,
              total: total,
              status: 'Pending',
              timestamp: Date.now()
            });

            // Send Email Notification
            if (EMAILJS_CONFIG.serviceID !== "YOUR_EMAILJS_SERVICE_ID") {
               try {
                 await emailjs.send(EMAILJS_CONFIG.serviceID, EMAILJS_CONFIG.templateID, {
                   shop_name: formData.shop,
                   customer_name: formData.name,
                   phone: formData.phone,
                   order_total: total.toFixed(2),
                   items: cart.map(i => `${i.qty}x ${i.name}${i.selectedOption ? ` (${i.selectedOption})` : ''}`).join(', ')
                 }, EMAILJS_CONFIG.publicKey);
               } catch(e) { console.error("EmailJS failed:", e); }
            }

            setCart([]);
            showToast("Order Placed! Roudi has been notified.");
            setView('shop');
          } catch (e) {
            showToast("Order failed. Check database permissions.", true);
          }
        };

        // ==========================================
        // VIEWS
        // ==========================================
        
        const LoginView = () => {
          const [isSignup, setIsSignup] = useState(false);
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [shopName, setShopName] = useState('');
          const [phone, setPhone] = useState('');

          const handleLogin = async (e) => {
            e.preventDefault();
            const cleanUser = username.trim().toLowerCase();
            
            let sessionPayload = null;

            // Check Super Admins
            if (ADMIN_ACCOUNTS[cleanUser] && ADMIN_ACCOUNTS[cleanUser] === password) {
              sessionPayload = { role: 'admin', data: { username: cleanUser } };
            } else {
              if (!fbUser) return showToast("Connecting to database... Please try again in a second.", true); // Slow-load protection
              
              // Check Customers
              const customer = customers.find(c => c.username.toLowerCase() === cleanUser && c.password === password);
              if (customer) {
                sessionPayload = { role: 'customer', data: customer };
              }
            }

            if (sessionPayload) {
              // Instantly update UI and set Cookie so user doesn't freeze
              setActiveUser(sessionPayload);
              setSessionCookie(sessionPayload);
              setView(sessionPayload.role === 'admin' ? 'admin' : 'landing');
              showToast(`Welcome back, ${sessionPayload.data.shopName || sessionPayload.data.username}!`);
              
              // Safely attempt to persist the session in the background
              if (fbUser) {
                 try {
                   await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'session', 'current'), sessionPayload);
                 } catch (err) {
                   console.error("Cloud persistence blocked by rules, session will exist in memory only.", err);
                 }
              }
            } else {
              showToast("Invalid credentials", true);
            }
          };

          const handleSignup = async (e) => {
            e.preventDefault();
            if (!fbUser) return showToast("System connecting... Please wait.", true);
            const cleanUser = username.trim().toLowerCase();
            
            if (ADMIN_ACCOUNTS[cleanUser]) {
               return showToast("Username unavailable.", true);
            }
            
            const exists = customers.find(c => c.username.toLowerCase() === cleanUser);
            if (exists) {
               return showToast("Username already taken.", true);
            }

            try {
              const newCust = { username: cleanUser, password, shopName, phone, timestamp: Date.now() };
              // Add customer to public directory so admins can see them
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), newCust);
              
              const sessionPayload = { role: 'customer', data: newCust };
              
              // Instantly update UI and set Cookie
              setActiveUser(sessionPayload);
              setSessionCookie(sessionPayload);
              setView('landing');
              showToast(`Account created! Welcome, ${shopName}!`);

              // Safely attempt to persist the session in the background
              if (fbUser) {
                 try {
                   await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'session', 'current'), sessionPayload);
                 } catch(err) {
                   console.error("Cloud persistence blocked by rules, session will exist in memory only.", err);
                 }
              }
            } catch (err) {
              showToast("Failed to create account.", true);
            }
          };

          return (
            <div className="p-8 flex flex-col items-center justify-center min-h-[80vh]">
              <div className="w-20 h-20 bg-black text-white rounded-[2rem] flex items-center justify-center mb-8 shadow-2xl">
                <LogInIcon />
              </div>
              <h2 className="text-3xl font-black mb-2 tracking-tight">{isSignup ? "Create Account" : "Access Portal"}</h2>
              <p className="text-gray-500 text-center mb-10 leading-relaxed text-sm">
                {isSignup ? "Register your shop to view wholesale pricing and place orders." : "Enter your provided wholesale credentials to view pricing and place orders."}
              </p>
              
              {isSignup ? (
                <form onSubmit={handleSignup} className="w-full space-y-4">
                  <input required placeholder="Shop/Business Name" className="w-full p-5 border border-gray-100 rounded-3xl text-center text-sm outline-none focus:ring-2 ring-black bg-gray-50" value={shopName} onChange={e => setShopName(e.target.value)} />
                  <input required placeholder="Cell Phone Number" className="w-full p-5 border border-gray-100 rounded-3xl text-center text-sm outline-none focus:ring-2 ring-black bg-gray-50" value={phone} onChange={e => setPhone(e.target.value)} />
                  <div className="flex gap-2">
                    <input required placeholder="Username" className="w-1/2 p-5 border border-gray-100 rounded-3xl text-center text-sm outline-none focus:ring-2 ring-black bg-gray-50 lowercase" value={username} onChange={e => setUsername(e.target.value.replace(/\s/g, ''))} />
                    <input required type="password" placeholder="Password" className="w-1/2 p-5 border border-gray-100 rounded-3xl text-center text-sm outline-none focus:ring-2 ring-black bg-gray-50 font-mono" value={password} onChange={e => setPassword(e.target.value)} />
                  </div>
                  <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest text-sm mt-4 shadow-lg hover:bg-blue-700 transition-colors">Register Shop</button>
                  <p className="mt-8 text-xs text-gray-400 text-center">Already have an account? <br/><button type="button" onClick={() => setIsSignup(false)} className="text-black font-bold mt-2 underline decoration-dotted">Login Here</button></p>
                </form>
              ) : (
                <form onSubmit={handleLogin} className="w-full space-y-4">
                  <input required placeholder="Username" className="w-full p-5 border border-gray-100 rounded-3xl text-center text-lg outline-none focus:ring-2 ring-black bg-gray-50 lowercase" value={username} onChange={e => setUsername(e.target.value.replace(/\s/g, ''))} />
                  <input required type="password" placeholder="Password" className="w-full p-5 border border-gray-100 rounded-3xl text-center text-lg outline-none focus:ring-2 ring-black bg-gray-50 font-mono tracking-widest" value={password} onChange={e => setPassword(e.target.value)} />
                  <button type="submit" className="w-full bg-black text-white py-5 rounded-3xl font-black uppercase tracking-widest text-sm mt-4 shadow-lg hover:bg-gray-900 transition-colors">Login Securely</button>
                  <p className="mt-8 text-xs text-gray-400 text-center">Don't have an account? <br/><button type="button" onClick={() => setIsSignup(true)} className="text-black font-bold mt-2 underline decoration-dotted">Create one here</button></p>
                </form>
              )}
            </div>
          );
        };

        const LandingView = () => {
          const featured = products.filter(p => p.isFeatured);
          
          return (
            <div className="pb-24 bg-gray-50 min-h-screen">
              {/* HERO */}
              <div className="bg-black text-white pt-12 pb-24 px-6 text-center rounded-b-[3rem] shadow-xl relative overflow-hidden">
                 <div className="relative z-10">
                   <h1 className="text-4xl font-black mb-3 tracking-tighter italic">PrimeTime</h1>
                   <p className="text-[11px] text-gray-300 uppercase tracking-[0.3em] font-bold">Premium Wholesale Distribution</p>
                 </div>
                 <div className="absolute -bottom-24 -right-10 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
                 <div className="absolute -top-10 -left-10 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl"></div>
              </div>

              <div className="p-6 relative z-20 -mt-16">
                {/* FEATURED CAROUSEL */}
                {featured.length > 0 && (
                  <div className="mb-10">
                    <div className="flex items-center gap-2 mb-4 px-2 text-white">
                      <Star filled />
                      <h3 className="font-black text-lg tracking-tight drop-shadow-md">Featured Items</h3>
                    </div>
                    <div className="flex overflow-x-auto pb-4 -mx-6 px-6 gap-4 snap-x">
                      {featured.map(p => (
                        <div key={p.id} onClick={() => { setCurrentCategory(p.category); setView('shop'); }} className="snap-start shrink-0 w-64 bg-white rounded-[2rem] p-4 shadow-md border border-gray-100 flex gap-4 items-center cursor-pointer active:scale-95 transition-transform">
                          <div className="w-20 h-20 bg-gray-50 rounded-[1.5rem] overflow-hidden shrink-0 flex items-center justify-center">
                             {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <span className="text-[8px] text-gray-300 italic">No Img</span>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <h4 className="font-bold text-sm truncate">{p.name}</h4>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1 mb-2">{p.category}</p>
                            {activeUser ? (
                              <span className="font-black text-black">${Number(p.price).toFixed(2)}</span>
                            ) : (
                              <span className="text-[10px] text-blue-600 font-bold uppercase">Login for Price</span>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* CATEGORIES GRID */}
                <div>

        const AdminView = () => {
          const [tab, setTab] = useState('products'); // products, orders, customers
          const [newProduct, setNewProduct] = useState({ 
             name: '', category: '', description: '', isFeatured: false,
             hasVariants: false, basePrice: '', baseStock: '',
             variants: [{ name: '', stock: '', price: '' }]
          });
          const [newCustomer, setNewCustomer] = useState({ username: '', password: '', shopName: '', phone: '' });
          
          const [imageStr, setImageStr] = useState(null);
          const [deletingId, setDeletingId] = useState(null); // shared delete state
          
          const [editingProduct, setEditingProduct] = useState(null);
          const [editImageStr, setEditImageStr] = useState(null);

          const handleAddProduct = async (e) => {
            e.preventDefault();
            if (!fbUser) return showToast("System connecting... Please wait.", true);
            
            try {
              const productData = {
                 name: newProduct.name,
                 category: newProduct.category,
                 description: newProduct.description,
                 isFeatured: newProduct.isFeatured,
                 hasVariants: newProduct.hasVariants,
                 image: imageStr,
                 timestamp: Date.now()
              };

              if (newProduct.hasVariants) {
                 productData.variants = newProduct.variants.filter(v => v.name.trim() !== '').map(v => ({
                     name: v.name,
                     stock: Number(v.stock) || 0,
                     price: Number(v.price) || 0
                 }));
                 productData.price = productData.variants.length > 0 ? productData.variants[0].price : 0;
                 productData.stock = productData.variants.reduce((sum, v) => sum + v.stock, 0);
              } else {
                 productData.price = Number(newProduct.basePrice) || 0;
                 productData.stock = Number(newProduct.baseStock) || 0;
              }

              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), productData);
              
              setNewProduct({ name: '', category: '', description: '', isFeatured: false, hasVariants: false, basePrice: '', baseStock: '', variants: [{ name: '', stock: '', price: '' }] });
              setImageStr(null);
              showToast("Product added.");
            } catch (e) { showToast("Failed to add product.", true); }
          };

          const handleEditSubmit = async (e) => {
            e.preventDefault();
            try {
              const updates = {
                name: editingProduct.name,
                category: editingProduct.category,
                description: editingProduct.description || '',
                isFeatured: editingProduct.isFeatured || false,
                hasVariants: editingProduct.hasVariants || false
              };
              if (editImageStr) updates.image = editImageStr;

              if (editingProduct.hasVariants) {
                 updates.variants = editingProduct.variants.filter(v => v.name.trim() !== '').map(v => ({
                     name: v.name,
                     stock: Number(v.stock) || 0,
                     price: Number(v.price) || 0
                 }));
                 updates.price = updates.variants.length > 0 ? updates.variants[0].price : 0;
                 updates.stock = updates.variants.reduce((sum, v) => sum + v.stock, 0);
              } else {
                 updates.price = Number(editingProduct.basePrice) || 0;
                 updates.stock = Number(editingProduct.baseStock) || 0;
                 updates.variants = [];
              }

              await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingProduct.id), updates);
              setEditingProduct(null);
              setEditImageStr(null);
              showToast("Product updated.");
            } catch (err) { showToast("Failed to update.", true); }
          };

          const handleAddCustomer = async (e) => {
            e.preventDefault();
            if (!fbUser) return;
            try {
              // Check if username exists
              const exists = customers.find(c => c.username.toLowerCase() === newCustomer.username.toLowerCase());
              if (exists) return showToast("Username already taken!", true);

              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), {
                ...newCustomer,
                timestamp: Date.now()
              });
              setNewCustomer({ username: '', password: '', shopName: '', phone: '' });
              showToast("Client account created!");
            } catch(e) { showToast("Failed to add client", true); }
          };

          const executeDelete = async (collectionName, id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id));
            setDeletingId(null);
            showToast("Item deleted.");
          };

          const processImage = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 500 / img.width;
                canvas.width = 500; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                callback(canvas.toDataURL('image/jpeg', 0.6));
              };
              img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
          };

                      {editingProduct.hasVariants ? (

                          </div>

                                  const newV = [...editingProduct.variants]; newV[i].name = e.target.value; setEditingProduct({...editingProduct, variants: newV});

                                  const newV = [...editingProduct.variants]; newV[i].price = e.target.value; setEditingProduct({...editingProduct, variants: newV});
                               }} />
                               <input placeholder="Qty" type="number" className="w-1/4 p-2 text-sm outline-none bg-transparent border-l border-gray-100" value={v.stock} onChange={e => {
                                  const newV = [...editingProduct.variants]; newV[i].stock = e.target.value; setEditingProduct({...editingProduct, variants: newV});
                               }} />
                               <button type="button" onClick={() => {
                                  const newV = editingProduct.variants.filter((_, idx) => idx !== i);
                                  setEditingProduct({...editingProduct, variants: newV.length ? newV : [{name:'', stock:'', price:''}]});
                               }} className="w-8 h-8 text-red-400 hover:text-red-600 flex items-center justify-center shrink-0 bg-red-50 rounded-lg"><Trash2 size={14}/></button>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="flex gap-2">
                          <input required placeholder="Price" type="number" step="0.01" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={editingProduct.basePrice} onChange={e => setEditingProduct({...editingProduct, basePrice: e.target.value})} />
                          <input required placeholder="Qty" type="number" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={editingProduct.baseStock} onChange={e => setEditingProduct({...editingProduct, baseStock: e.target.value})} />
                        </div>
                      )}

                      <textarea placeholder="Product Description" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black resize-none h-24" value={editingProduct.description} onChange={e => setEditingProduct({...editingProduct, description: e.target.value})}></textarea>
                      <button type="submit" className="w-full bg-black text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs mt-2">Save Changes</button>
                    </form>
                  </div>
                </div>
              )}

              {/* ADMIN HEADER */}
              <div className="bg-black text-white p-6 pt-10 pb-8 text-center rounded-b-[2.5rem] shadow-xl relative">
                <h2 className="text-3xl font-black tracking-tight mb-1">HQ Portal</h2>
                <p className="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold">Logged in as {activeUser?.data?.username}</p>
              </div>

              {/* ADMIN TABS */}
              <div className="flex p-4 gap-2">
                <button onClick={() => setTab('orders')} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex flex-col items-center gap-1 transition-colors ${tab==='orders' ? 'bg-black text-white shadow-md' : 'bg-white text-gray-500 border border-gray-100'}`}><Package /> Orders {orders.length>0 && `(${orders.length})`}</button>
                <button onClick={() => setTab('products')} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex flex-col items-center gap-1 transition-colors ${tab==='products' ? 'bg-black text-white shadow-md' : 'bg-white text-gray-500 border border-gray-100'}`}><ShoppingCart /> Inventory</button>
                <button onClick={() => setTab('customers')} className={`flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex flex-col items-center gap-1 transition-colors ${tab==='customers' ? 'bg-black text-white shadow-md' : 'bg-white text-gray-500 border border-gray-100'}`}><Users /> Clients</button>
              </div>

              <div className="px-4 mt-2">
                {/* TAB: ORDERS */}
                {tab === 'orders' && (
                  <div className="space-y-4">
                    {orders.map(o => (
                      <div key={o.id} className="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm relative overflow-hidden">
                        {deletingId === o.id ? (
                          <div className="absolute inset-0 bg-red-500 text-white flex flex-col items-center justify-center p-4 z-10">
                            <p className="font-bold mb-3 text-sm">Delete order permanently?</p>
                            <div className="flex gap-3 w-full">
                              <button onClick={() => setDeletingId(null)} className="flex-1 bg-white/20 rounded-xl py-2 text-xs font-bold">Cancel</button>
                              <button onClick={() => executeDelete('orders', o.id)} className="flex-1 bg-white text-red-600 rounded-xl py-2 text-xs font-bold">Delete</button>
                            </div>
                          </div>
                        ) : null}
                        <div className="flex justify-between border-b border-gray-50 pb-3 mb-3">
                          <div>
                            <span className="font-black text-lg text-gray-900 block">{o.customer.shop}</span>
                            <span className="text-xs text-gray-500 font-medium">{o.customer.name} · {o.customer.phone}</span>
                          </div>
                          <button onClick={() => setDeletingId(o.id)} className="text-gray-300 hover:text-red-500 transition-colors"><Trash2 /></button>
                        </div>
                        <div className="space-y-2 mb-4">
                          {o.items.map((i,idx) => (
                            <div key={idx} className="text-sm text-gray-600 flex justify-between bg-gray-50 p-2 rounded-xl px-3">
                              <span><span className="font-black text-black">{i.qty}x</span> {i.name} {i.selectedOption && <span className="text-xs text-gray-500 ml-1">({i.selectedOption})</span>}</span>
                              <span className="font-bold text-gray-900">${(i.price * i.qty).toFixed(2)}</span>
                            </div>
                          ))}
                        </div>
                        <div className="pt-3 border-t border-gray-100 font-black text-xl flex justify-between text-blue-600">
                          <span>Total</span>
                          <span>${o.total.toFixed(2)}</span>
                        </div>
                      </div>
                    ))}
                    {orders.length === 0 && <p className="text-center text-gray-400 italic text-sm py-10">No pending orders.</p>}
                  </div>
                )}

                {/* TAB: PRODUCTS */}
                {tab === 'products' && (
                  <div>
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-md border border-gray-100 mb-8">
                      <h3 className="font-black mb-4 text-xs uppercase tracking-widest text-gray-800">Add New Product</h3>
                      <form onSubmit={handleAddProduct} className="space-y-4">
                        <div className="relative w-full aspect-video bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden">
                          {imageStr ? <img src={imageStr} className="w-full h-full object-cover" /> : <div className="text-center text-gray-400"><Camera /><span className="text-[10px] font-bold uppercase mt-2 block">Upload Photo</span></div>}
                          <input type="file" accept="image/*" onChange={(e) => processImage(e.target.files[0], setImageStr)} className="absolute inset-0 opacity-0 cursor-pointer" />
                        </div>
                        
                        <label className="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100 cursor-pointer transition-colors active:bg-gray-100">
                          <input type="checkbox" checked={newProduct.isFeatured} onChange={e => setNewProduct({...newProduct, isFeatured: e.target.checked})} className="w-5 h-5 rounded accent-black" />
                          <span className="font-bold text-sm text-gray-800">Feature on Landing Page</span>
                          <Star filled={newProduct.isFeatured} />
                        </label>
                        
                        <input required placeholder="Item Name" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} />
                        <input required placeholder="Category" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newProduct.category} onChange={e => setNewProduct({...newProduct, category: e.target.value})} />
                        
                        <label className="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100 cursor-pointer mt-4">
                          <input type="checkbox" checked={newProduct.hasVariants} onChange={e => setNewProduct({...newProduct, hasVariants: e.target.checked})} className="w-5 h-5 rounded accent-black" />
                          <span className="font-bold text-sm">Product has multiple flavors/options</span>
                        </label>

                        {newProduct.hasVariants ? (
                          <div className="space-y-3 bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <div className="flex justify-between items-center mb-2">
                               <h4 className="text-xs font-bold uppercase tracking-widest text-gray-500">Flavors & Pricing</h4>
                               <button type="button" onClick={() => setNewProduct({...newProduct, variants: [...newProduct.variants, {name: '', stock: '', price: ''}]})} className="text-[10px] font-bold uppercase tracking-widest text-blue-600 bg-blue-100 px-3 py-1.5 rounded-lg">+ Add</button>
                            </div>
                            {newProduct.variants.map((v, i) => (
                              <div key={i} className="flex gap-2 items-center bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                                 <input placeholder="Flavor Name" className="w-2/5 p-2 text-sm outline-none bg-transparent font-bold" value={v.name} onChange={e => {
                                    const newV = [...newProduct.variants]; newV[i].name = e.target.value; setNewProduct({...newProduct, variants: newV});
                                 }} />
                                 <input placeholder="Price" type="number" step="0.01" className="w-1/4 p-2 text-sm outline-none bg-transparent border-l border-gray-100" value={v.price} onChange={e => {
                                    const newV = [...newProduct.variants]; newV[i].price = e.target.value; setNewProduct({...newProduct, variants: newV});
                                 }} />
                                 <input placeholder="Qty" type="number" className="w-1/4 p-2 text-sm outline-none bg-transparent border-l border-gray-100" value={v.stock} onChange={e => {
                                    const newV = [...newProduct.variants]; newV[i].stock = e.target.value; setNewProduct({...newProduct, variants: newV});
                                 }} />
                                 <button type="button" onClick={() => {
                                    const newV = newProduct.variants.filter((_, idx) => idx !== i);
                                    setNewProduct({...newProduct, variants: newV.length ? newV : [{name:'', stock:'', price:''}]});
                                 }} className="w-8 h-8 text-red-400 hover:text-red-600 flex items-center justify-center shrink-0 bg-red-50 rounded-lg"><Trash2 size={14}/></button>
                              </div>
                            ))}
                          </div>
                        ) : (
                          <div className="flex gap-2">
                            <input required placeholder="Price" type="number" step="0.01" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newProduct.basePrice} onChange={e => setNewProduct({...newProduct, basePrice: e.target.value})} />
                            <input required placeholder="Qty" type="number" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newProduct.baseStock} onChange={e => setNewProduct({...newProduct, baseStock: e.target.value})} />
                          </div>
                        )}
                        
                        <textarea placeholder="Product Description (optional)" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black resize-none h-24" value={newProduct.description} onChange={e => setNewProduct({...newProduct, description: e.target.value})}></textarea>
                        <button type="submit" className="w-full bg-black text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs">Save to Catalog</button>
                      </form>
                    </div>

                    <h3 className="font-black mb-4 text-xs uppercase tracking-widest text-gray-800">Active Inventory ({products.length})</h3>
                    <div className="space-y-3">
                      {products.map(p => {
                        const isVariantItem = p.hasVariants && p.variants?.length > 0;
                        const displayStock = isVariantItem ? p.variants.reduce((sum, v) => sum + v.stock, 0) : p.stock;
                        const displayPrice = isVariantItem ? p.variants[0].price : p.price;
                        
                        return (
                          <div key={p.id} className="flex gap-3 p-4 bg-white rounded-[2rem] border border-gray-100 shadow-sm items-center relative overflow-hidden">
                             {deletingId === p.id ? (
                              <div className="absolute inset-0 bg-red-500 text-white flex items-center justify-between px-6 z-10">
                                <span className="font-bold text-xs uppercase tracking-widest">Confirm Delete?</span>
                                <div className="flex gap-2">
                                  <button onClick={() => setDeletingId(null)} className="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold">Cancel</button>
                                  <button onClick={() => executeDelete('products', p.id)} className="bg-white text-red-600 px-4 py-2 rounded-xl text-xs font-bold">Delete</button>
                                </div>
                              </div>
                            ) : null}
                            <div className="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center shrink-0 overflow-hidden relative">
                              {p.isFeatured && <div className="absolute top-1 left-1"><Star filled /></div>}
                              {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <span className="text-[8px] italic text-gray-400">No Img</span>}
                            </div>
                            <div className="flex-1 min-w-0">
                              <h4 className="font-bold text-sm truncate text-gray-900">{p.name}</h4>
                              <div className="flex items-center gap-2 mt-1">
                                <p className="text-xs font-black text-black">${displayPrice}</p>
                                <span className="w-1 h-1 bg-gray-300 rounded-full"></span>
                                <p className={`text-[10px] font-bold uppercase tracking-widest ${displayStock > 0 ? 'text-green-600' : 'text-red-500'}`}>Qty: {displayStock || 0}</p>
                              </div>
                            </div>
                            <div className="flex items-center gap-2">
                              <button onClick={() => { 
                                  setEditingProduct({
                                     ...p,
                                     basePrice: p.price || '',
                                     baseStock: p.stock || '',
                                     hasVariants: p.hasVariants || false,
                                     variants: p.variants && p.variants.length > 0 ? p.variants : [{ name: '', stock: '', price: p.price || '' }]
                                  }); 
                                  setEditImageStr(null); 
                              }} className="w-10 h-10 flex items-center justify-center text-blue-500 hover:text-blue-700 bg-blue-50 rounded-full transition-colors"><EditIcon /></button>
                              <button onClick={() => setDeletingId(p.id)} className="w-10 h-10 flex items-center justify-center text-red-400 hover:text-red-600 bg-red-50 rounded-full transition-colors"><Trash2 /></button>
                            </div>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}

                {/* TAB: CUSTOMERS */}
                {tab === 'customers' && (
                  <div>
                     <div className="bg-white p-6 rounded-[2.5rem] shadow-md border border-gray-100 mb-8">
                      <h3 className="font-black mb-4 text-xs uppercase tracking-widest text-gray-800">Create Client Account</h3>
                      <p className="text-xs text-gray-500 mb-6">Create login credentials for a shop owner. When they log in, they will be able to see wholesale prices and their shop details will autofill at checkout.</p>
                      <form onSubmit={handleAddCustomer} className="space-y-4">
                        <div className="flex gap-2">
                          <input required placeholder="Username (no spaces)" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black bg-gray-50 lowercase" value={newCustomer.username} onChange={e => setNewCustomer({...newCustomer, username: e.target.value.replace(/\s/g, '')})} />
                          <input required placeholder="Password" type="text" className="w-1/2 p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black bg-gray-50 font-mono" value={newCustomer.password} onChange={e => setNewCustomer({...newCustomer, password: e.target.value})} />
                        </div>
                        <input required placeholder="Contact Name (e.g. Mike)" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newCustomer.shopName} onChange={e => setNewCustomer({...newCustomer, shopName: e.target.value})} />
                        <input required placeholder="Cell Phone Number" className="w-full p-4 border border-gray-100 rounded-2xl text-sm outline-none focus:ring-2 ring-black" value={newCustomer.phone} onChange={e => setNewCustomer({...newCustomer, phone: e.target.value})} />
                        <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg shadow-blue-600/30">Create Account</button>
                      </form>
                    </div>

                    <h3 className="font-black mb-4 text-xs uppercase tracking-widest text-gray-800">Authorized Clients ({customers.length})</h3>
                    <div className="space-y-3">
                      {customers.map(c => (
                        <div key={c.id} className="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm relative overflow-hidden">
                          {deletingId === c.id ? (
                            <div className="absolute inset-0 bg-red-500 text-white flex flex-col items-center justify-center p-4 z-10">
                              <p className="font-bold mb-3 text-sm">Revoke this client's access?</p>
                              <div className="flex gap-3 w-full">
                                <button onClick={() => setDeletingId(null)} className="flex-1 bg-white/20 rounded-xl py-2 text-xs font-bold">Cancel</button>
                                <button onClick={() => executeDelete('customers', c.id)} className="flex-1 bg-white text-red-600 rounded-xl py-2 text-xs font-bold">Revoke</button>
                              </div>
                            </div>
                          ) : null}
                          <div className="flex justify-between items-start">
                            <div>
                              <h4 className="font-black text-lg text-gray-900">{c.shopName}</h4>
                              <p className="text-xs text-gray-500 mb-3">{c.phone}</p>
                              <div className="bg-gray-100 px-3 py-2 rounded-xl inline-block">
                                <span className="text-[10px] uppercase tracking-widest text-gray-400 font-bold block mb-1">Login Credentials</span>
                                <span className="text-xs font-mono text-gray-800 font-bold border-r border-gray-300 pr-2 mr-2">U: {c.username}</span>
                                <span className="text-xs font-mono text-gray-800 font-bold">P: {c.password}</span>
                              </div>
                            </div>
                            <button onClick={() => setDeletingId(c.id)} className="text-gray-300 hover:text-red-500"><Trash2 /></button>
                          </div>
                        </div>
                      ))}
                      {customers.length === 0 && <p className="text-center text-gray-400 italic text-sm py-10">No client accounts created yet.</p>}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        // THE FIX: Keeps the UI from flashing a blank screen or a login screen while it checks your session
        if (loadingAuth) {
           return (
               <div className="min-h-screen flex flex-col items-center justify-center bg-gray-50 text-black">
                   <div className="w-16 h-16 border-4 border-black border-t-transparent rounded-full animate-spin mb-4"></div>
                   <p className="text-gray-500 font-bold uppercase tracking-widest text-xs">Authenticating...</p>
               </div>
           );
        }

        return (
          <div className="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative font-sans">
            
            {/* CUSTOM TOAST NOTIFICATION */}
            {toast && (
              <div className={`absolute top-4 left-4 right-4 z-[100] p-4 rounded-2xl shadow-xl flex items-center gap-3 text-sm font-bold ${toast.isError ? 'bg-red-500 text-white' : 'bg-green-500 text-white'} transition-all duration-300 animate-[bounce_0.3s_ease-out]`}>
                {toast.isError ? "⚠️" : "✅"} {toast.message}
              </div>
            )}

            {/* GLOBAL NAVIGATION HEADER */}
            <header className="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 flex justify-between items-center p-4 px-6">
              <button onClick={() => { setCurrentCategory(null); setView('landing'); }} className="text-gray-800 hover:text-black active:scale-95 transition-transform"><HomeIcon /></button>
              <div className="flex gap-4 items-center">
                {activeUser ? (
                  <>
                    {activeUser.role === 'admin' && view !== 'admin' && (
                      <button onClick={() => setView('admin')} className="text-gray-800 font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-colors">
                        HQ Portal
                      </button>
                    )}
                    <button onClick={async () => {
                       setActiveUser(null);
                       clearSessionCookie();
                       setView('landing');
                       setCurrentCategory(null);
                       showToast("Logged out successfully");
                    }} className="text-gray-400 hover:text-red-500 font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 active:scale-95 transition-colors">
                      Logout
                    </button>
                  </>
                ) : (
                  <button onClick={() => setView('login')} className="text-gray-400 hover:text-black font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 transition-colors"><LogInIcon /> Login</button>
                )}
                
                <button onClick={() => setView('cart')} className="relative text-black active:scale-95 transition-transform ml-2">
                  <ShoppingCart />
                  {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-blue-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-black border-2 border-white shadow-sm">{cart.reduce((s,i)=>s+i.qty,0)}</span>}
                </button>
              </div>
            </header>

            {/* ROUTER */}
            {view === 'landing' && <LandingView />}
            {view === 'shop' && <ShopView />}
            {view === 'admin' && activeUser?.role === 'admin' && <AdminView />}
            {view === 'login' && <LoginView />}
            {view === 'cart' && <CartView />}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    };

    // THE FIX: Wait for Firebase imports to finish before trying to run React
    if (window.firebaseDeps) {
        startApp(); 
    } else {
        window.addEventListener('firebase-loaded', startApp); 
    }
  </script>
</body>
</html>
